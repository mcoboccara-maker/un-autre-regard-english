# codemagic.yaml - Configuration CI/CD pour Un Autre Regard
# Documentation: https://docs.codemagic.io/yaml/yaml-getting-started/

workflows:
  # ============================================
  # WORKFLOW iOS - Build et déploiement TestFlight
  # ============================================
  ios-release:
    name: iOS Release - Another Perspective
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: Un Autre Regard  # Nom de l'intégration dans Codemagic
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.unautreregard.app.en
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # Variables d'environnement (à configurer dans Codemagic UI)
        APP_ID: 0  # Will be auto-detected via integration
      groups:
        - app_store_credentials  # Groupe de variables pour les credentials
    
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true
        - pattern: release/*
          include: true
          source: true
      tag_patterns:
        - pattern: 'v*'
          include: true
    
    scripts:
      # Étape 1: Récupérer les dépendances Flutter
      - name: Get Flutter packages
        script: |
          flutter pub get
      
      # Étape 2: Analyser le code (optionnel mais recommandé)
      - name: Analyze code
        script: |
          flutter analyze --no-fatal-infos
        ignore_failure: true
      
      # Étape 3: Exécuter les tests (optionnel)
      - name: Run tests
        script: |
          flutter test
        ignore_failure: true
      
      # Étape 4: Installer CocoaPods
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
      
      # Étape 5: Configuration iOS automatique
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      
      # Étape 6: Incrémenter le numéro de build
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_ID" || echo "0")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      
      # Étape 7: Build de l'application iOS
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-name=2.1.0 \
            --export-options-plist=/Users/builder/export_options.plist
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    
    publishing:
      email:
        recipients:
          - mcoboccara@gmail.com
        notify:
          success: true
          failure: true
      
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Pour soumission automatique à l'App Store (optionnel):
        # submit_to_app_store: true

  # ============================================
  # WORKFLOW Android - Build APK/AAB (bonus)
  # ============================================
  android-release:
    name: Android Release - Un Autre Regard
    max_build_duration: 30
    instance_type: linux_x2
    
    environment:
      flutter: stable
      java: 17
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      
      - name: Build Android APK
        script: |
          flutter build apk --release
      
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release
    
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    
    publishing:
      email:
        recipients:
          - mcoboccara@gmail.com
        notify:
          success: true
          failure: true

  # ============================================
  # WORKFLOW Debug/Test rapide
  # ============================================
  ios-debug:
    name: iOS Debug Build (Test)
    max_build_duration: 30
    instance_type: mac_mini_m2
    
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    
    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      
      - name: Build iOS (debug, no signing)
        script: |
          flutter build ios --debug --no-codesign
    
    artifacts:
      - build/ios/iphoneos/*.app
