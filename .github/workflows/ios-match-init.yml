name: iOS Match Init (one-time setup)

on:
  workflow_dispatch:

jobs:
  init-match:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Decode App Store Connect API Key
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > ios/fastlane/AuthKey.p8

      - name: Generate certificates and profiles with Match
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          cd ios
          bundle exec fastlane run match type:appstore \
            git_basic_authorization:$(echo -n "${GH_PAT}:x-oauth-basic" | base64) \
            api_key_path:fastlane/AuthKey.p8 \
            app_identifier:com.unautreregard.app.en \
            team_id:$APPLE_TEAM_ID \
            readonly:false

      - name: Clean up API key
        if: always()
        run: rm -f ios/fastlane/AuthKey.p8
