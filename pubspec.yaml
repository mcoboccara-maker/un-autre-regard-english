name: un_autre_regard
description: Application "Un Autre Regard" - Ecoute et connaissance de soi
version: 2.2.1+14

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  crypto: ^3.0.3
  url_launcher: ^6.1.0
  
  # Navigation et state management
  go_router: ^12.1.3
  provider: ^6.1.1
  
  # Stockage local
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI/UX
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  flutter_staggered_animations: ^1.1.1
  flutter_markdown: ^0.6.18
  
  # HTTP et API
  http: ^1.1.0
  dio: ^5.3.2
  
  # Utilitaires
  uuid: ^4.2.1
  intl: ^0.18.1
  
  # Audio - Lecture vocale TTS
  flutter_tts: ^3.8.5
  
  # Audio - Son de la roue de la sagesse
  audioplayers: ^5.2.1

  # Video - Tutoriel mode d'emploi
  video_player: ^2.8.1
  
  # Icons
  cupertino_icons: ^1.0.2
  material_design_icons_flutter: ^7.0.7296
  
  # Graphiques et visualisations pour timeline emotionnelle
  fl_chart: ^0.65.0
  
  # Formatage des dates et temps relatifs
  timeago: ^3.6.0
  
  # Animations avancees
  lottie: ^2.7.0
  
  # Pour les collections et utilitaires
  collection: ^1.17.2
  
  # JSON annotation
  json_annotation: ^4.8.1
  
  # Partage natif multi-plateforme (WhatsApp, Email, etc.)
  share_plus: ^10.1.2
  
  # Acces aux repertoires systeme
  path_provider: ^2.1.5

  # Connexion sociale (Google, Apple, Facebook)
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  flutter_facebook_auth: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.3
  
  # Pour la generation de code JSON
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    # Dossiers principaux
    - assets/images/
    - assets/icon/
    - assets/animations/

    # Sons (pour la roue de la sagesse)
    - assets/sounds/

    # Video tutoriel
    - assets/video/
    
    # Univers visuel - TOUS les sous-dossiers
    - assets/univers_visuel/
    - assets/univers_visuel/orientation/
    - assets/univers_visuel/evaluation/
    - assets/univers_visuel/icon/
    - assets/univers_visuel/essai_test/

    # Sceaux émotions (Sacred Seal Mode V6) — 512px optimisés pour le web
    - assets/emotions_seal/

    # Glyphes émotions (Field Engine) — sans texte, fond transparent
    - assets/emotions_glyph/

    # Mandala de fond (tibétain bleu-vert 1024px)
    - assets/mandala/

    # Masques visages — scénario A (terracotta androgyne)
    - assets/masks/terracotta/

    # Masques visages — scénario B (pastels colorés androgyne)
    - assets/masks/pastel/
    
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/univers_visuel/iconeapplication.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/univers_visuel/iconeapplication.png"
